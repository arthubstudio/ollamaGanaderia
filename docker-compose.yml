services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ganaderia_db
    restart: always
    environment:
      POSTGRES_USER: ganaderia
      POSTGRES_PASSWORD: ganaderia123
      POSTGRES_DB: ganaderia_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollamaganaderia
    restart: always
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: