services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ganaderia_db
    restart: always
    environment:
      POSTGRES_USER: ganaderia
      POSTGRES_PASSWORD: ganaderia123
      POSTGRES_DB: ganaderia_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: